<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Чаты — Nirbi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/main.css"/>
  <link rel="stylesheet" href="css/tasks.css"/>
  <link rel="stylesheet" href="css/chats.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.5/signalr.min.js"></script>
</head>
<body>

<!-- Burger button (shown on mobile ≤640px) -->
<button class="btn-burger" id="btn-burger" aria-label="Открыть меню" aria-expanded="false" aria-controls="sidebar">
  <svg class="icon-open" viewBox="0 0 20 20" fill="none">
    <path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
  </svg>
  <svg class="icon-close" viewBox="0 0 20 20" fill="none" style="display:none">
    <path d="M4 4l12 12M16 4L4 16" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
  </svg>
</button>

<div id="app-shell">

  <!-- ── Sidebar ─────────────────────────────────────────────────────────── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <span class="brand-logo">N</span>
      <span class="brand-name">Nirbi</span>
    </div>
    <nav class="sidebar-nav">
      <a href="tasks.html" class="nav-item" data-tooltip="Задачи">
        <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="8" height="8" rx="2" stroke="currentColor" stroke-width="1.75"/><rect x="13" y="3" width="8" height="8" rx="2" stroke="currentColor" stroke-width="1.75"/><rect x="3" y="13" width="8" height="8" rx="2" stroke="currentColor" stroke-width="1.75"/><rect x="13" y="13" width="8" height="8" rx="2" stroke="currentColor" stroke-width="1.75"/></svg>
        <span>Задачи</span>
      </a>
      <a href="chats.html" class="nav-item active" data-tooltip="Чаты">
        <svg viewBox="0 0 24 24" fill="none"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Чаты</span>
      </a>
      <a href="confirmations.html" class="nav-item" data-tooltip="Подтверждения">
        <svg viewBox="0 0 24 24" fill="none"><path d="M9 12l2 2 4-4M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0z" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Подтверждения</span>
      </a>
      <a href="users.html" class="nav-item" data-tooltip="Пользователи">
        <svg viewBox="0 0 24 24" fill="none"><circle cx="9" cy="8" r="3.25" stroke="currentColor" stroke-width="1.75"/><path d="M3.5 19c0-3 2.46-5.25 5.5-5.25s5.5 2.25 5.5 5.25" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/><path d="M16 5.5a3 3 0 0 1 0 6M18 19c0-2.2-.9-3.9-2.3-5" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/></svg>
        <span>Пользователи</span>
      </a>
      <a href="profile.html" class="nav-item" data-tooltip="Мой профиль">
        <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.75"/><path d="M4 20c0-4 3.582-7 8-7s8 3 8 7" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/></svg>
        <span>Профиль</span>
      </a>
    </nav>
    <button class="nav-item nav-logout" id="btn-logout" data-tooltip="Выйти">
      <svg viewBox="0 0 24 24" fill="none"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>Выйти</span>
    </button>
  </aside>

  <!-- Sidebar overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- ── Main ──────────────────────────────────────────────────────────────── -->
  <main class="main-content chats-main">

    <!-- Левая панель: список чатов -->
    <div class="chats-sidebar">
      <div class="chats-sidebar-header">
        <h2 class="chats-sidebar-title">Сообщения</h2>
        <button class="icon-btn" id="btn-search-chats" title="Поиск чата">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
            <circle cx="9" cy="9" r="6"/><path d="M13.5 13.5L17 17"/>
          </svg>
        </button>
      </div>

      <!-- Поиск по чатам -->
      <div id="chat-search-wrap" hidden>
        <input type="text" id="chat-search-input" class="field-input"
               placeholder="Поиск по чатам…" autocomplete="off" style="margin-bottom:.75rem;"/>
      </div>

      <!-- Список -->
      <div id="chat-list" class="chat-list" role="list"></div>
    </div>

    <!-- Правая панель: тред -->
    <div class="chat-thread" id="chat-thread">

      <!-- Приветственный экран -->
      <div class="chat-welcome" id="chat-welcome">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <h3>Выберите чат</h3>
        <p>Выберите беседу из списка слева, чтобы начать общение</p>
      </div>

      <!-- Шапка треда (скрыта пока не выбран чат) -->
      <div class="thread-header" id="thread-header" hidden>
        <div class="thread-avatar" id="thread-avatar"></div>
        <div class="thread-info">
          <div class="thread-title" id="thread-title"></div>
          <div class="thread-sub" id="thread-sub"></div>
        </div>
      </div>

      <!-- Сообщения -->
      <div class="msg-container" id="msg-container" hidden></div>

      <!-- Баннер редактирования -->
      <div class="edit-banner" id="edit-banner" hidden>
        <svg width="14" height="14" viewBox="0 0 20 20" fill="none"><path d="M13.586 3.586a2 2 0 1 1 2.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Редактирование: <em id="edit-preview"></em>
        <button class="edit-banner-cancel" id="btn-cancel-edit" title="Отмена">✕</button>
      </div>

      <!-- Ввод сообщения -->
      <div class="msg-input-wrap" id="msg-input-wrap" hidden>
        <textarea id="msg-input" class="msg-textarea" rows="1"
                  placeholder="Напишите сообщение…" maxlength="4000"></textarea>
        <button id="btn-send" class="btn-send" title="Отправить">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 10l14-7-7 14V10H3z" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>

  </main>
</div>

<div id="toast-container"></div>

<script type="module" src="js/chats.js"></script>
<script src="js/burger.js"></script>
</body>
</html>
