<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Пользователи — Nirbi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/tasks.css" />
  <style>
    /* ── Users page ─────────────────────────────────────────────────────── */
    .users-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }
    .user-card {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      cursor: pointer;
      transition: all var(--transition);
      animation: fadeSlide .25s ease both;
      min-width: 0;
    }
    .user-card:hover {
      border-color: var(--primary);
      box-shadow: var(--shadow), 0 0 0 3px rgba(1,75,170,.06);
      transform: translateY(-2px);
    }
    .user-card.skeleton {
      cursor: default; pointer-events: none; min-height: 92px;
      background: linear-gradient(90deg, var(--surface) 25%, #e8ecf2 50%, var(--surface) 75%);
      background-size: 200% 100%; animation: shimmer 1.4s infinite; border-color: transparent;
    }
    .user-avatar {
      width: 52px; height: 52px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, var(--primary) 0%, #0263d1 100%);
      color: #fff; display: grid; place-items: center;
      font-family: 'Instrument Serif', serif; font-size: 1.25rem;
    }
    .user-info { flex: 1; min-width: 0; }
    .user-name {
      font-weight: 700; color: var(--text); font-size: .95rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .user-sub {
      font-size: .8rem; color: var(--text-sec); margin-top: .1rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .user-badges { display: flex; gap: .35rem; margin-top: .45rem; }
    .user-badge {
      font-size: .65rem; font-weight: 700; letter-spacing: .03em;
      padding: .15rem .45rem; border-radius: 6px;
      background: var(--primary-light); color: var(--primary);
    }
    .user-actions { display: flex; flex-direction: column; gap: .4rem; flex-shrink: 0; }
    .user-btn-view { height: 36px; padding: 0 1rem; font-size: .8rem; }

    .users-toolbar { display: flex; gap: .75rem; align-items: center; flex-wrap: wrap; }
    .users-toolbar .search-wrap { flex: 1; min-width: 220px; }

    .users-pager {
      display: flex; align-items: center; justify-content: center;
      gap: 1rem; padding: 1.5rem 0 .5rem;
    }
    .users-pager .page-label { font-size: .85rem; font-weight: 600; color: var(--text-sec); }
    .pager-btn {
      height: 38px; padding: 0 1.1rem; border-radius: var(--radius-sm);
      border: 1.5px solid var(--border); background: var(--bg);
      font-size: .85rem; font-weight: 700; color: var(--text);
      transition: all var(--transition);
    }
    .pager-btn:hover:not(:disabled) { border-color: var(--primary); color: var(--primary); }
    .pager-btn:disabled { opacity: .45; cursor: not-allowed; }

    /* Invite modal */
    .invite-task-list { display: flex; flex-direction: column; gap: .5rem; margin-top: 1rem; max-height: 320px; overflow-y: auto; }
    .invite-task-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: .85rem 1rem; border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); background: var(--bg);
      font-size: .9rem; font-weight: 600; color: var(--text);
      cursor: pointer; transition: all var(--transition); text-align: left; width: 100%;
    }
    .invite-task-item:hover:not(:disabled) { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }
    .invite-task-item:disabled { opacity: .5; cursor: not-allowed; }
    .invite-task-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .invite-task-arrow { flex-shrink: 0; opacity: .6; }
    .invite-loading, .invite-empty { padding: 1.5rem 1rem; text-align: center; color: var(--text-sec); font-size: .875rem; }

    @media (max-width: 480px) {
      .user-card { flex-wrap: wrap; }
      .user-actions { flex-direction: row; width: 100%; }
      .user-btn-view, .user-actions .btn-primary { flex: 1; }
    }
  </style>
</head>
<body>

<div id="toast-container"></div>

<!-- Burger button (shown on mobile ≤640px) -->
<button class="btn-burger" id="btn-burger" aria-label="Открыть меню" aria-expanded="false" aria-controls="sidebar">
  <svg class="icon-open" viewBox="0 0 20 20" fill="none">
    <path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
  </svg>
  <svg class="icon-close" viewBox="0 0 20 20" fill="none" style="display:none">
    <path d="M4 4l12 12M16 4L4 16" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
  </svg>
</button>

<div id="app-shell">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <span class="brand-logo">N</span>
      <span class="brand-name">Nirbi</span>
    </div>
    <nav class="sidebar-nav">
      <a href="tasks.html" class="nav-item" data-tooltip="Задачи">
        <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="8" height="8" rx="2" stroke="currentColor" stroke-width="1.75"/><rect x="13" y="3" width="8" height="8" rx="2" stroke="currentColor" stroke-width="1.75"/><rect x="3" y="13" width="8" height="8" rx="2" stroke="currentColor" stroke-width="1.75"/><rect x="13" y="13" width="8" height="8" rx="2" stroke="currentColor" stroke-width="1.75"/></svg>
        <span>Задачи</span>
      </a>
      <a href="chats.html" class="nav-item" data-tooltip="Чаты">
        <svg viewBox="0 0 24 24" fill="none"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Чаты</span>
      </a>
      <a href="confirmations.html" class="nav-item" data-tooltip="Подтверждения">
        <svg viewBox="0 0 24 24" fill="none"><path d="M9 12l2 2 4-4M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0z" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Подтверждения</span>
      </a>
      <a href="users.html" class="nav-item active" data-tooltip="Пользователи">
        <svg viewBox="0 0 24 24" fill="none"><circle cx="9" cy="8" r="3.25" stroke="currentColor" stroke-width="1.75"/><path d="M3.5 19c0-3 2.46-5.25 5.5-5.25s5.5 2.25 5.5 5.25" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/><path d="M16 5.5a3 3 0 0 1 0 6M18 19c0-2.2-.9-3.9-2.3-5" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/></svg>
        <span>Пользователи</span>
      </a>
      <a href="profile.html" class="nav-item" data-tooltip="Мой профиль">
        <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.75"/><path d="M4 20c0-4 3.582-7 8-7s8 3 8 7" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/></svg>
        <span>Профиль</span>
      </a>
    </nav>
    <button class="nav-item nav-logout" id="btn-logout" data-tooltip="Выйти">
      <svg viewBox="0 0 24 24" fill="none"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>Выйти</span>
    </button>
  </aside>

  <!-- Sidebar overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- Main -->
  <main class="main-content">
    <header class="page-header">
      <div class="page-title-block">
        <h1 class="page-title">Пользователи</h1>
        <p class="page-sub" id="users-count-label">Загрузка...</p>
      </div>
    </header>

    <div class="users-toolbar">
      <div class="search-wrap">
        <svg viewBox="0 0 20 20" fill="none"><circle cx="9" cy="9" r="6" stroke="currentColor" stroke-width="1.5"/><path d="M15 15l-2.5-2.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <input type="text" id="users-search" class="search-input" placeholder="Поиск по имени или email..." />
      </div>
    </div>

    <section class="cards-section">
      <div class="users-grid" id="users-grid">
        <div class="user-card skeleton"></div>
        <div class="user-card skeleton"></div>
        <div class="user-card skeleton"></div>
        <div class="user-card skeleton"></div>
        <div class="user-card skeleton"></div>
        <div class="user-card skeleton"></div>
      </div>
      <div class="empty-state" id="users-empty" hidden>
        <svg viewBox="0 0 64 64" fill="none"><circle cx="32" cy="32" r="28" stroke="var(--border)" stroke-width="2"/><circle cx="32" cy="26" r="8" stroke="var(--border)" stroke-width="2"/><path d="M18 46c0-7 6-12 14-12s14 5 14 12" stroke="var(--border)" stroke-width="2" stroke-linecap="round"/></svg>
        <p>Пользователи не найдены</p>
        <span>Попробуйте изменить поисковый запрос</span>
      </div>

      <div class="users-pager" id="users-pager" hidden>
        <button class="pager-btn" id="btn-prev" disabled>← Назад</button>
        <span class="page-label" id="page-label">Стр. 1</span>
        <button class="pager-btn" id="btn-next">Вперёд →</button>
      </div>
    </section>
  </main>
</div>

<!-- ── Invite to task modal ───────────────────────────────────────────────── -->
<div class="modal-overlay" id="modal-invite" hidden>
  <div class="modal modal-confirm-inner" style="text-align:left;align-items:stretch;max-width:460px;">
    <h3 class="confirm-title" style="text-align:center;">Пригласить в задачу</h3>
    <p class="confirm-text" style="text-align:center;">
      Выберите свою задачу, в которую хотите пригласить <strong id="invite-user-name">пользователя</strong>.
    </p>
    <div class="invite-task-list" id="invite-task-list">
      <div class="invite-loading">Загрузка ваших задач…</div>
    </div>
    <div class="confirm-actions" style="margin-top:1.1rem;">
      <button class="btn-secondary" id="btn-cancel-invite">Отмена</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.7/signalr.min.js"></script>
<script type="module" src="js/users.js"></script>
<script src="js/burger.js"></script>
</body>
</html>
