<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Подтверждения — Nirbi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/tasks.css" />
</head>
<body>

<div id="toast-container"></div>

<!-- Burger button (shown on mobile ≤640px) -->
<button class="btn-burger" id="btn-burger" aria-label="Открыть меню" aria-expanded="false" aria-controls="sidebar">
  <svg class="icon-open" viewBox="0 0 20 20" fill="none">
    <path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
  </svg>
  <svg class="icon-close" viewBox="0 0 20 20" fill="none" style="display:none">
    <path d="M4 4l12 12M16 4L4 16" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
  </svg>
</button>

<div id="app-shell">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <span class="brand-logo">N</span>
      <span class="brand-name">Nirbi</span>
    </div>
    <nav class="sidebar-nav">
      <a href="tasks.html" class="nav-item" data-tooltip="Задачи">
        <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="8" height="8" rx="2" stroke="currentColor" stroke-width="1.75"/><rect x="13" y="3" width="8" height="8" rx="2" stroke="currentColor" stroke-width="1.75"/><rect x="3" y="13" width="8" height="8" rx="2" stroke="currentColor" stroke-width="1.75"/><rect x="13" y="13" width="8" height="8" rx="2" stroke="currentColor" stroke-width="1.75"/></svg>
        <span>Задачи</span>
      </a>
      <a href="chats.html" class="nav-item" data-tooltip="Чаты">
        <svg viewBox="0 0 24 24" fill="none"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Чаты</span>
      </a>
      <a href="confirmations.html" class="nav-item active" data-tooltip="Подтверждения">
        <svg viewBox="0 0 24 24" fill="none"><path d="M9 12l2 2 4-4M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0z" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Подтверждения</span>
      </a>
      <a href="users.html" class="nav-item" data-tooltip="Пользователи">
        <svg viewBox="0 0 24 24" fill="none"><circle cx="9" cy="8" r="3.25" stroke="currentColor" stroke-width="1.75"/><path d="M3.5 19c0-3 2.46-5.25 5.5-5.25s5.5 2.25 5.5 5.25" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/><path d="M16 5.5a3 3 0 0 1 0 6M18 19c0-2.2-.9-3.9-2.3-5" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/></svg>
        <span>Пользователи</span>
      </a>
      <a href="profile.html" class="nav-item" data-tooltip="Мой профиль">
        <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.75"/><path d="M4 20c0-4 3.582-7 8-7s8 3 8 7" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/></svg>
        <span>Профиль</span>
      </a>
    </nav>
    <button class="nav-item nav-logout" id="btn-logout" data-tooltip="Выйти">
      <svg viewBox="0 0 24 24" fill="none"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>Выйти</span>
    </button>
  </aside>

  <!-- Sidebar overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- Main -->
  <main class="main-content">
    <header class="page-header">
      <div class="page-title-block">
        <h1 class="page-title">Подтверждения</h1>
        <p class="page-sub" id="conf-count-label">Загрузка...</p>
      </div>
      <div class="page-actions">
        <button class="btn-secondary" id="btn-refresh-conf">
          <svg viewBox="0 0 20 20" fill="none" style="width:18px;height:18px"><path d="M3 10a7 7 0 0 1 12.5-4.4M17 10a7 7 0 0 1-12.5 4.4M16 3v3h-3M4 17v-3h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Обновить
        </button>
      </div>
    </header>

    <div class="toggle-group conf-tabs" id="conf-tabs">
      <button class="toggle-btn active" data-tab="received">
        Полученные
        <span class="tab-counter" id="cnt-received">0</span>
      </button>
      <button class="toggle-btn" data-tab="sent">
        Отправленные
        <span class="tab-counter" id="cnt-sent">0</span>
      </button>
    </div>

    <section class="conf-list-section">
      <div class="conf-list" id="conf-list">
        <div class="conf-card skeleton"></div>
        <div class="conf-card skeleton"></div>
        <div class="conf-card skeleton"></div>
      </div>
      <div class="empty-state" id="empty-state" hidden>
        <svg viewBox="0 0 64 64" fill="none"><circle cx="32" cy="32" r="28" stroke="var(--border)" stroke-width="2"/><path d="M20 32l8 8 16-16" stroke="var(--border)" stroke-width="2" stroke-linecap="round"/></svg>
        <p>Здесь пока пусто</p>
        <span id="empty-state-sub">Подтверждений пока нет</span>
      </div>
    </section>
  </main>
</div>

<!-- ── Reject reason modal ─────────────────────────────────────────────────── -->
<div class="modal-overlay" id="modal-reject" hidden>
  <div class="modal modal-confirm-inner" style="text-align:left;align-items:stretch;max-width:440px;">
    <h3 class="confirm-title" style="text-align:center;">Отклонить заявку?</h3>
    <p class="confirm-text" style="text-align:center;">Вы можете указать причину отклонения — это необязательно.</p>
    <div class="field-group" style="margin-top:1.1rem;">
      <label class="field-label" for="reject-reason">Причина отклонения <span class="hint-text">— необязательно</span></label>
      <textarea class="field-input field-textarea" id="reject-reason" rows="3"
        placeholder="Например: недостаточно опыта для этой задачи"></textarea>
    </div>
    <div class="confirm-actions" style="margin-top:1.1rem;">
      <button class="btn-secondary" id="btn-cancel-reject">Отмена</button>
      <button class="btn-danger" id="btn-confirm-reject">
        <span class="btn-label">Отклонить</span>
        <span class="btn-spinner" hidden></span>
      </button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.7/signalr.min.js"></script>
<script type="module" src="js/confirmations.js"></script>
<script src="js/burger.js"></script>
</body>
</html>
