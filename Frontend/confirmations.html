<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Подтверждения — Nirbi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/tasks.css" />
</head>
<body>

<div id="toast-container"></div>

<div id="app-shell">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <span class="brand-logo">N</span>
      <span class="brand-name">Nirbi</span>
    </div>
    <nav class="sidebar-nav">
      <a href="tasks.html" class="nav-item" data-tooltip="Задачи">
        <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="8" height="8" rx="2" stroke="currentColor" stroke-width="1.75"/><rect x="13" y="3" width="8" height="8" rx="2" stroke="currentColor" stroke-width="1.75"/><rect x="3" y="13" width="8" height="8" rx="2" stroke="currentColor" stroke-width="1.75"/><rect x="13" y="13" width="8" height="8" rx="2" stroke="currentColor" stroke-width="1.75"/></svg>
        <span>Задачи</span>
      </a>
      <a href="confirmations.html" class="nav-item active" data-tooltip="Подтверждения">
        <svg viewBox="0 0 24 24" fill="none"><path d="M9 12l2 2 4-4M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0z" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Подтверждения</span>
      </a>
      <a href="profile.html" class="nav-item" data-tooltip="Мой профиль">
        <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.75"/><path d="M4 20c0-4 3.582-7 8-7s8 3 8 7" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/></svg>
        <span>Профиль</span>
      </a>
    </nav>
    <button class="nav-item nav-logout" id="btn-logout" data-tooltip="Выйти">
      <svg viewBox="0 0 24 24" fill="none"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>Выйти</span>
    </button>
  </aside>

  <!-- Main -->
  <main class="main-content">
    <header class="page-header">
      <div class="page-title-block">
        <h1 class="page-title">Подтверждения</h1>
        <p class="page-sub" id="conf-count-label">Загрузка...</p>
      </div>
      <div class="page-actions">
        <button class="btn-secondary" id="btn-refresh-conf">
          <svg viewBox="0 0 20 20" fill="none" style="width:18px;height:18px"><path d="M3 10a7 7 0 0 1 12.5-4.4M17 10a7 7 0 0 1-12.5 4.4M16 3v3h-3M4 17v-3h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Обновить
        </button>
      </div>
    </header>

    <div class="toggle-group conf-tabs" id="conf-tabs">
      <button class="toggle-btn active" data-tab="received">
        Полученные
        <span class="tab-counter" id="cnt-received">0</span>
      </button>
      <button class="toggle-btn" data-tab="sent">
        Отправленные
        <span class="tab-counter" id="cnt-sent">0</span>
      </button>
    </div>

    <section class="conf-list-section">
      <div class="conf-list" id="conf-list">
        <div class="conf-card skeleton"></div>
        <div class="conf-card skeleton"></div>
        <div class="conf-card skeleton"></div>
      </div>
      <div class="empty-state" id="empty-state" hidden>
        <svg viewBox="0 0 64 64" fill="none"><circle cx="32" cy="32" r="28" stroke="var(--border)" stroke-width="2"/><path d="M20 32l8 8 16-16" stroke="var(--border)" stroke-width="2" stroke-linecap="round"/></svg>
        <p>Здесь пока пусто</p>
        <span id="empty-state-sub">Подтверждений пока нет</span>
      </div>
    </section>
  </main>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.7/signalr.min.js"></script>
<script type="module" src="js/confirmations.js"></script>
</body>
</html>
