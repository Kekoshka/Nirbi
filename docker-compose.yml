services:
  postgres:
    image: postgres:16-alpine
    container_name: auth_postgres
    environment:
      POSTGRES_DB: auth
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_INITDB_ARGS: --encoding=UTF8 --locale=en_US.UTF-8
    ports:
      - "5434:5432"
    volumes:
      - ./init-databases.sql:/docker-entrypoint-initdb.d/01-init-databases.sql
      - postgres_data:/var/lib/postgresql/data
    networks:
      - auth_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  kafka:
    image: apache/kafka:4.2.0
    container_name: kafka
    ports:
      - "9092:9092"
      - "29092:29092" 
    environment:
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092,CONTROLLER://kafka:9093
      KAFKA_LOG4J_LOGGERS: "kafka.request.logger=DEBUG"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - auth_network

  minio:
    image: minio/minio:latest
    container_name: nirbi_minio
    command: server /data --address ":9002" --console-address ":9001" 
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9002:9002"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - auth_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: auth_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - auth_network
    command: redis-server --appendonly yes --requirepass redis_password
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: auth_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin_password
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - auth_network
    restart: unless-stopped

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: auth_redis_commander
    environment:
      REDIS_HOSTS: local:redis:6379:0:redis_password
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - auth_network
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: auth_keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin_password
      KC_PROXY: edge
      KC_HOSTNAME_STRICT: false
      KC_HEALTH_ENABLED: true
    ports:
      - "8082:8080"
      - "9000:9000" 
    command: start-dev
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - keycloak_data:/opt/keycloak/data
    networks:
      - auth_network
    healthcheck:
      test: ['CMD-SHELL', '[ -f /tmp/HealthCheck.java ] || echo "public class HealthCheck { public static void main(String[] args) throws java.lang.Throwable { System.exit(java.net.HttpURLConnection.HTTP_OK == ((java.net.HttpURLConnection)new java.net.URL(args[0]).openConnection()).getResponseCode() ? 0 : 1); } }" > /tmp/HealthCheck.java && java /tmp/HealthCheck.java http://localhost:9000/health/live']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    
  schema-registry:
    image: confluentinc/cp-schema-registry:latest
    depends_on:
     - kafka
    ports:
      - 8083:8081
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: 'PLAINTEXT://kafka:29092'
      SCHEMA_REGISTRY_LISTENERS: 'http://0.0.0.0:8081'
    networks:
      - auth_network
    restart: unless-stopped

  authservice.webapi:
    build:
      context: .
      dockerfile: AuthService.WebApi/Dockerfile
    container_name: auth_service
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: Server=postgres;Database=auth;User Id=postgres;Password=postgres_password;Port=5432;
      ConnectionStrings__Redis: redis:6379,password=redis_password
      Auth__Issuer: myapp-auth
      Auth__Audience: myapp-services
      Auth__SecretKey: your_super_secret_key_min_32_chars_long_here_change_me_123456789
      Auth__AccessTokenExpirationMinutes: 60
      Auth__RefreshTokenExpirationDays: 30
      Keycloak__Url: http://keycloak:8080
      Keycloak__Realm: nirbi
      Keycloak__AdminClientId: admin-cli
      Keycloak__AdminClientSecret: CIVfy4OyV4G0jLdtRp7LTAgI0hyjiLL4
      Keycloak__PublicClientId: nirbi
      ServiceTokens__AccessTokenExpirationMinutes: 60
      ServiceTokens__MaxTokenCacheMinutes: 50
      Logging__LogLevel__Default: Information
      Logging__LogLevel__Microsoft: Warning
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - auth_network
    restart: unless-stopped

  notificationservice.webapi:
    build:
      context: .
      dockerfile: NotificationService.WebApi/Dockerfile
    container_name: notification-service
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000
      ExternalServicesOptions__KafkaAddress: kafka:29092
      ExternalServicesOptions__SchemaRegistryAddress: http://schema-registry:8081
      ExternalServicesOptions__ConfirmationServiceTopic: confirmation-service
      ExternalServicesOptions__MinorTaskServiceTopic: minor-task-service
      KafkaConsumersOptions__GroupId: NotificationService
      KafkaConsumersOptions__AutoOffsetReset: Earliest
      KafkaConsumersOptions__EnableAutoCommit: "true"
      NirbiServiceAuth__AuthServiceBaseUrl: http://authservice.webapi:5000
      NirbiServiceAuth__ClientId: notification-service
      NirbiServiceAuth__ClientSecret: 
      NirbiServiceAuth__TokenRefreshSkewSeconds: 120
      NirbiServiceAuth__ServiceJwt__Issuer: myapp-auth
      NirbiServiceAuth__ServiceJwt__Audience: myapp-services
      NirbiServiceAuth__ServiceJwt__SigningKey: your_super_secret_key_min_32_chars_long_here_change_me_123456789
    ports:
      - "5001:5000"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      schema-registry:
        condition: service_started
    networks:
      - auth_network
    restart: unless-stopped

  dataservice.webapi:
    build:
      context: .
      dockerfile: DataService.WebApi/Dockerfile
    container_name: data_service
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__PostgreSql: Server=postgres;Database=data_service;User Id=postgres;Password=postgres_password;Port=5432;
      S3Storage__BucketName: nirbi-data
      S3Storage__ServiceUrl: http://minio:9002
      S3Storage__AccessKey: minioadmin
      S3Storage__SecretKey: minioadmin
      S3Storage__ForcePathStyle: "true"
      NirbiServiceAuth__ServiceJwt__Issuer: myapp-auth
      NirbiServiceAuth__ServiceJwt__Audience: myapp-services
      NirbiServiceAuth__ServiceJwt__SigningKey: your_super_secret_key_min_32_chars_long_here_change_me_123456789
    ports:
      - "5002:5000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - auth_network
    restart: unless-stopped

  minortaskservice.webapi:
    build:
      context: .
      dockerfile: MinorTaskService.WebApi/Dockerfile
    container_name: minor-task-service
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__PostgreSql: Server=postgres;Database=minor_task_service;User Id=postgres;Password=postgres_password;Port=5432;
      NirbiServiceAuth__ServiceJwt__Issuer: myapp-auth
      NirbiServiceAuth__ServiceJwt__Audience: myapp-services
      NirbiServiceAuth__ServiceJwt__SigningKey: your_super_secret_key_min_32_chars_long_here_change_me_123456789
      NirbiServiceAuth__AuthServiceBaseUrl: http://localhost:5000
      NirbiServiceAuth__ClientId: minor-task-service
      NirbiServiceAuth__ClientSecret: 
      NirbiServiceAuth__TokenRefreshSkewSeconds: 120
      ExternalServicesOptions__KafkaAddress: kafka:29092
      ExternalServicesOptions__SchemaRegistryAddress: http://schema-registry:8081
      ExternalServicesOptions__MinorTaskServiceTopic: minor-task-service
      ExternalServicesOptions__TaskParticipantServiceTopic: task-participant-service
      Logging__LogLevel__Default: Information
      Logging__LogLevel__Microsoft: Warning
    ports:
      - "5003:5000"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - auth_network
    restart: unless-stopped  

  confirmationservice.webapi:
    build:
      context: .
      dockerfile: ConfirmationService.WebApi/Dockerfile
    container_name: confirmation-service
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000
      ExternalServicesOptions__KafkaAddress: kafka:29092
      ExternalServicesOptions__SchemaRegistryAddress: http://schema-registry:8081
      ExternalServicesOptions__ConfirmationServiceTopic: confirmation-service
      ExternalServicesOptions__CommunicationServiceAddress: ""
      NirbiServiceAuth__AuthServiceBaseUrl: http://authservice.webapi:5000
      NirbiServiceAuth__ClientId: confirmation-service
      NirbiServiceAuth__ClientSecret: rZ7BfrlKJWEe5Wt5Wsa5m72S9Xiwu8cRDae+R+lC+e4=
      NirbiServiceAuth__TokenRefreshSkewSeconds: 120
      NirbiServiceAuth__ServiceJwt__Issuer: myapp-auth
      NirbiServiceAuth__ServiceJwt__Audience: myapp-services
      NirbiServiceAuth__ServiceJwt__SigningKey: your_super_secret_key_min_32_chars_long_here_change_me_123456789
      NirbiServiceAuth__Keycloak__Authority: http://keycloak:8080/realms/nirbi
      NirbiServiceAuth__Keycloak__Audience: nirbi
      NirbiServiceAuth__Keycloak__RequireHttpsMetadata: "false"
      Logging__LogLevel__Default: Information
      Logging__LogLevel__Microsoft: Warning
    ports:
      - "5004:5000"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      kafka:
        condition: service_started
      schema-registry:
        condition: service_started
    networks:
      - auth_network
    restart: unless-stopped

  apigateway:
    build:
      context: .
      dockerfile: ApiGateway/Dockerfile
    container_name: api_gateway
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000
      GatewayBaseUrl: http://localhost:8080
      Jwt__Issuer: myapp-auth
      Jwt__Audience: myapp-services
      Jwt__SigningKey: your_super_secret_key_min_32_chars_long_here_change_me_123456789
      Services__AuthService: http://authservice.webapi:5000
      Services__NotificationService: http://notificationservice.webapi:5000
      Services__DataService: http://dataservice.webapi:5000
      Services__MinorTaskService: http://minortaskservice.webapi:5000
      Services__ConfirmationService: http://confirmationservice.webapi:5000
      Cors__AllowedOrigins__0: http://localhost:3000
      Cors__AllowedOrigins__1: http://localhost:5173
    ports:
      - "8084:5000"
    depends_on:
      authservice.webapi:
        condition: service_started
      notificationservice.webapi:
        condition: service_started
      dataservice.webapi:
        condition: service_started
      minortaskservice.webapi:
        condition: service_started
      confirmationservice.webapi:
        condition: service_started
    networks:
      - auth_network
    restart: unless-stopped


volumes:
  postgres_data:
    driver: local
  keycloak_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  kafka_data:
    driver: local

networks:
  auth_network:
    driver: bridge